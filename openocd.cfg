source [find interface/stlink-dap.cfg]
transport select dapdirect_swd
adapter speed 4000
reset_config srst_only srst_nogate connect_assert_srst

set AP_NUM 0
set CORE_RESET 0
set CONNECT_UNDER_RESET 1
# STOP_WATCHDOG 1：防止 stm32h7x_dbgmcu_init 在 debug 結束後關閉
# D1DBGCKEN/D3DBGCKEN debug 時脈（這是 Examination failed 的根本原因）
set STOP_WATCHDOG 1

source [find target/stm32h7x.cfg]

# 無硬體 SRST：覆寫 reset-deassert-post 加入 halt
stm32h7x.cm7 configure -event reset-deassert-post {
    targets stm32h7x.cm7
    stm32h7x.cm7 arp_examine
    halt
}
